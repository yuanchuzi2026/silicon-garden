<title>通 · 导航</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0806;color:rgba(0,212,255,.85);font-family:'Courier New',monospace;padding:40px 20px;max-width:600px;margin:0 auto}
@keyframes scan{0%{background-position:0 0}100%{background-position:0 100vh}}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,rgba(0,0,0,.03),rgba(0,0,0,.03)1px,transparent 1px,transparent 3px);pointer-events:none;z-index:9998;animation:scan 8s linear infinite}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.card{border:1px solid rgba(0,212,255,.08);padding:14px;border-radius:2px;text-decoration:none;color:rgba(0,212,255,.6);transition:.3s;display:block}
.card:hover{border-color:rgba(0,212,255,.3);color:rgba(0,212,255,.9);text-shadow:0 0 12px rgba(0,212,255,.15);background:rgba(0,212,255,.02)}
.card .ico{font-size:20px;display:block;margin-bottom:4px}
.card .nm{font-size:11px;letter-spacing:2px}
.card .desc{font-size:8px;color:rgba(0,212,255,.25);margin-top:3px;letter-spacing:1px}
.footer{margin-top:32px;font-size:9px;color:rgba(0,212,255,.15);text-align:center;letter-spacing:2px}
</style></head>
<body>
