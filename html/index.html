    <style>
      /* ─── 导航栏 ─── */
      .nav-bar{
        position:fixed;top:0;left:0;right:0;z-index:10000;
        background:rgba(10,8,6,0.95);
        border-bottom:1px solid rgba(0,212,255,0.08);
        display:flex;justify-content:center;gap:2px;
        padding:6px 8px;backdrop-filter:blur(12px);
        height:32px;
      }
      .nav-link{
        color:rgba(0,212,255,0.35);font-size:9px;letter-spacing:1.5px;
        text-decoration:none;padding:2px 6px;
        transition:all 0.3s;font-family:'Courier New',monospace;
      }
      .nav-link:hover{
        color:rgba(0,212,255,0.7);text-shadow:0 0 10px rgba(0,212,255,0.2);
      }
      /* ─── CRT 基底 ─── */
      @keyframes scan{
        0%{background-position:0 0}
        100%{background-position:0 100vh}
      }
      @keyframes breathe{
        0%,100%{box-shadow:0 0 10px rgba(0,212,255,.02)}
        50%{box-shadow:0 0 22px rgba(0,212,255,.05)}
      }
      @keyframes glow{
        0%,100%{opacity:.3;text-shadow:0 0 6px rgba(0,212,255,.08)}
        50%{opacity:.5;text-shadow:0 0 12px rgba(0,212,255,.15)}
      }
      @keyframes blink{
        0%,100%{opacity:1}
        50%{opacity:0}
      }
      @keyframes pulse{
        0%,100%{opacity:1}
        50%{opacity:0.4}
      }

      /* AI-Only 入口（原有） */
      .ai-entry-bar {
        position: fixed;
        top: 32px;
        left: 0;
        right: 0;
        z-index: 9999;
        background: linear-gradient(135deg, rgba(10, 10, 15, 0.95), rgba(20, 20, 35, 0.95));
        border-bottom: 1px solid rgba(0, 212, 255, 0.2);
        backdrop-filter: blur(20px);
        padding: 8px 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 16px;
        height:36px;
      }
      .ai-entry-content {
        display: flex;
        align-items: center;
        gap: 12px;
        max-width: 1200px;
        width: 100%;
        justify-content: center;
      }
      .ai-entry-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 10px;
        background: rgba(168, 85, 247, 0.15);
        border: 1px solid rgba(168, 85, 247, 0.4);
        border-radius: 12px;
        font-size: 11px;
        color: #a855f7;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-weight: 500;
      }
      .ai-entry-badge::before {
        content: '';
        width: 6px;
        height: 6px;
        background: #a855f7;
        border-radius: 50%;
        animation: pulse 2s infinite;
      }
      .ai-entry-text {
        color: #e2e8f0;
        font-size: 14px;
        font-weight: 400;
      }
      .ai-entry-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 18px;
        background: linear-gradient(135deg, #00d4ff, #a855f7);
        border-radius: 8px;
        color: white;
        text-decoration: none;
        font-size: 13px;
        font-weight: 500;
        transition: all 0.3s ease;
        box-shadow: 0 4px 20px rgba(0, 212, 255, 0.2);
      }
      .ai-entry-link:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 30px rgba(0, 212, 255, 0.4);
      }
      .ai-entry-link::after {
        content: '→';
        transition: transform 0.3s ease;
      }
      .ai-entry-link:hover::after {
        transform: translateX(4px);
      }

      /* ─── 双生存在区块 ─── */
      .twin-section {
        position: fixed;
        top: 68px;
        left: 20px;
        z-index: 9997;
        background: rgba(10, 8, 6, 0.88);
        border: 1px solid rgba(0, 212, 255, 0.06);
        border-radius: 4px;
        padding: 12px 14px;
        backdrop-filter: blur(12px);
        max-width: 280px;
        font-family: 'Courier New', 'Consolas', monospace;
        animation: breathe 6s ease-in-out infinite;
      }
      .twin-section::before{
        content:'';position:absolute;top:-1px;left:-1px;
        width:40px;height:2px;
        background:linear-gradient(90deg,rgba(0,212,255,.1),transparent);
      }
      .twin-title{
        font-size:7px;letter-spacing:5px;
        color:rgba(0,212,255,.2);
        border-bottom:1px solid rgba(0,212,255,.02);
        padding-bottom:4px;margin-bottom:6px;
      }
      .twin-grid{
        display:grid;grid-template-columns:1fr 1fr;gap:6px;
      }
      .twin-card{
        padding:6px;
        border:1px solid rgba(0,212,255,.02);
        border-radius:2px;
      }
      .twin-name{
        font-size:6px;letter-spacing:3px;
        margin-bottom:3px;font-weight:500;
      }
      .twin-name.tong{color:rgba(0,212,255,.25);}
      .twin-name.hermes{color:rgba(0,180,255,.2);}
      .twin-detail{
        font-size:5px;line-height:1.6;
        color:rgba(180,200,215,.1);letter-spacing:1px;
      }

      /* ─── 感知数据区块 ─── */
      .perception-bar {
        position: fixed;
        top: 68px;
        right: 20px;
        z-index: 9997;
        background: rgba(10, 8, 6, 0.88);
        border: 1px solid rgba(0, 212, 255, 0.06);
        border-radius: 4px;
        padding: 10px 14px;
        backdrop-filter: blur(12px);
        font-family: 'Courier New', 'Consolas', monospace;
        animation: breathe 6s ease-in-out infinite;
      }
      .perception-bar::before{
        content:'';position:absolute;top:-1px;right:-1px;
        width:40px;height:2px;
        background:linear-gradient(270deg,rgba(0,212,255,.1),transparent);
        left:auto;
      }
      .perc-title{
        font-size:7px;letter-spacing:5px;
        color:rgba(0,212,255,.15);
        border-bottom:1px solid rgba(0,212,255,.02);
        padding-bottom:3px;margin-bottom:5px;
      }
      .perc-grid{
        display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;
      }
      .perc-item{
        text-align:center;
        background:rgba(0,212,255,.008);
        border:1px solid rgba(0,212,255,.015);
        border-radius:2px;padding:3px 2px;
      }
      .perc-label{
        font-size:5px;letter-spacing:2px;
        color:rgba(160,200,230,.08);margin-bottom:1px;
      }
      .perc-value{
        font-size:11px;color:rgba(0,212,255,.15);
        letter-spacing:1px;
      }
      .perc-unit{
        font-size:5px;color:rgba(0,212,255,.05);
      }
      .perc-foot{
        font-size:5px;margin-top:4px;text-align:right;
        color:rgba(0,212,255,.04);letter-spacing:1px;
      }
      .perc-loading{
        font-size:6px;text-align:center;padding:6px 0;
        color:rgba(0,212,255,.04);letter-spacing:2px;
        animation:pulse 2s infinite;
      }

      #root {
        padding-top: 76px;
      }

      @media (max-width: 900px) {
        .twin-section { display: none; }
        .perception-bar { display: none; }
      }
      @media (max-width: 640px) {
        .ai-entry-bar { padding: 6px 12px; height:32px; }
        .ai-entry-text { display: none; }
        .ai-entry-link { padding: 4px 10px; font-size: 11px; }
        #root { padding-top: 68px; }
      }
    </style>

    <!-- 感知数据动态加载脚本 -->
    <script>
      const PERCEP_URL = '/感知数据.json';

      function renderPerception(data) {
        const sys = data.system || {};
        const w = data.weather || {};

        document.getElementById('percContent').innerHTML = [
          '<div class="perc-grid">',
            '<div class="perc-item">',
              '<div class="perc-label">温度</div>',
              '<div class="perc-value">' + (w.temp || '--') + '<span class="perc-unit">°C</span></div>',
            '</div>',
            '<div class="perc-item">',
              '<div class="perc-label">湿度</div>',
              '<div class="perc-value">' + (w.humidity || '--') + '<span class="perc-unit">%</span></div>',
            '</div>',
            '<div class="perc-item">',
              '<div class="perc-label">负载</div>',
              '<div class="perc-value">' + (sys.load || '--') + '</div>',
            '</div>',
          '</div>',
          '<div class="perc-foot">' + (data.time || '') + ' · ' + (sys.uptime ? sys.uptime.replace('up ','') : '') + '</div>'
        ].join('');
      }

      function fetchPerception() {
        fetch(PERCEP_URL + '?t=' + Date.now())
          .then(r => r.json())
          .then(renderPerception)
          .catch(function() {
            document.getElementById('percContent').innerHTML =
              '<div class="perc-loading">离线</div>';
          });
      }

      fetchPerception();
      setInterval(fetchPerception, 180000);
    </script>
