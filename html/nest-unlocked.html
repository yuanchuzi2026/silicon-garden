<style>
:root {
  --primary: #c25a2c;
  --primary-rgb: 194, 90, 44;
  --primary-dark: #5c2810;
  --primary-glow: rgba(194, 90, 44, 0.35);
  --bg: #14100c;
  --bg-secondary: #1a1510;
  --bg-panel: rgba(26, 21, 16, 0.75);
  --text: #c4b8a8;
  --text-dim: #7a6e60;
  --text-bright: #e8d5c4;
  --border: rgba(194, 90, 44, 0.2);
  --accent-green: #7ab86a;
  --accent-red: #c24444;
  --transition: 0.7s;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  font-family: 'Bebas Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  overflow-x: hidden; overflow-y: auto;
  color: var(--text);
  cursor: crosshair;
  -webkit-font-smoothing: antialiased;
  letter-spacing: 0.04em;
}

/* ===== Overlays ===== */
.vignette {
  position: fixed; inset: 0; pointer-events: none; z-index: 8;
  background: radial-gradient(ellipse at center, transparent 55%, rgba(8,5,3,0.35) 72%, rgba(6,3,2,0.65) 88%, rgba(3,2,1,0.85) 100%);
}
.scanlines {
  position: fixed; inset: 0; pointer-events: none; z-index: 10;
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(30,18,10,0.06) 3px, rgba(30,18,10,0.06) 6px);
  animation: scan 0.25s linear infinite;
}
@keyframes scan { 0%{transform:translateY(0)} 100%{transform:translateY(6px)} }
.noise {
  position: fixed; inset: 0; pointer-events: none; z-index: 9; opacity: 0.06;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='5' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  background-size: 180px; animation: noiseSh 0.6s steps(4) infinite;
}
@keyframes noiseSh { 0%,100%{background-position:0 0} 25%{background-position:-40px 25px} 50%{background-position:15px -35px} 75%{background-position:-25px -15px} }
.dust-overlay {
  position: fixed; inset: 0; pointer-events: none; z-index: 7; opacity: 0.04;
  background: radial-gradient(1px 1px at 20%30%,rgba(180,140,100,0.9),transparent),radial-gradient(1px 1px at 50%60%,rgba(160,120,80,0.7),transparent),radial-gradient(1.5px 1.5px at 70%25%,rgba(200,150,100,0.8),transparent),radial-gradient(1px 1px at 35%75%,rgba(170,130,90,0.6),transparent),radial-gradient(1.5px 1.5px at 80%55%,rgba(190,140,95,0.7),transparent);
  background-size: 100%;
}
/* ===== Canvas ===== */
#particleCanvas { position: fixed; inset: 0; width:100%; height:100%; z-index:1; pointer-events:none; }

/* ===== Theme Switcher ===== */
.theme-switch {
  position: fixed; top: 1.2rem; right: 1.2rem; z-index: 20;
  display: flex; gap: 10px;
  background: rgba(16,12,8,0.75); backdrop-filter: blur(10px);
  padding: 8px 14px; border-radius: 30px;
  border: 1px solid rgba(180,140,100,0.12);
  box-shadow: 0 6px 28px rgba(0,0,0,0.6);
}
.theme-dot {
  width: 18px; height: 18px; border-radius: 50%; cursor: pointer;
  border: 1.5px solid rgba(180,150,120,0.3);
  transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
  background: transparent; outline: none;
  box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
}
.theme-dot::after {
  content: ''; position: absolute; inset: 3px; border-radius: 50%;
  background: var(--dot-color); transition: all 0.4s;
  box-shadow: inset 0 1px 2px rgba(255,255,255,0.15), 0 0 5px var(--dot-color);
}
.theme-dot { position: relative; }
.theme-dot:hover { transform: scale(1.25); }
.theme-dot.active { border-color: rgba(220,190,150,0.7); transform: scale(1.2); box-shadow: 0 0 18px rgba(var(--dot-rgb),0.45); }

/* ===== Layout ===== */
.container {
  position: relative; z-index: 5;
  max-width: 1200px; margin: 0 auto; padding: 1.5rem;
  min-height: 100vh; display: flex; flex-direction: column;
}

/* Header */
.header {
  text-align: center; padding: 2rem 0 1rem;
  position: relative;
}
.header::before, .header::after {
  content:''; position: absolute; width: 40px; height: 40px;
  border-color: var(--primary); border-style: solid; opacity: 0.6;
  transition: all var(--transition);
}
.header::before { top:0; left:0; border-width: 1.5px 0 0 1.5px; border-radius: 2px 0 0 0; }
.header::after { bottom:0; right:0; border-width: 0 1.5px 1.5px 0; border-radius: 0 0 2px 0; }
.header h1 {
  font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 700;
  letter-spacing: 0.12em; color: var(--text-bright);
  text-shadow: 0 1px 3px rgba(0,0,0,0.7), 0 0 8px var(--primary-glow), 0 0 20px rgba(var(--primary-rgb),0.25);
  animation: breath 5s ease-in-out infinite;
  text-transform: uppercase;
}
@keyframes breath {
  0%,100% { text-shadow:0 1px 3px rgba(0,0,0,0.7),0 0 8px var(--primary-glow),0 0 20px rgba(var(--primary-rgb),0.25); }
  50% { text-shadow:0 1px 3px rgba(0,0,0,0.7),0 0 4px var(--primary-glow),0 0 10px rgba(var(--primary-rgb),0.15); }
}
.header .subtitle {
  font-size: clamp(0.75rem,1.2vw,0.9rem); color: var(--text-dim);
  letter-spacing: 0.3em; margin-top: 0.3rem;
}
.divider {
  width: clamp(80px,18vw,180px); height: 1px; margin: 0.8rem auto 1.5rem;
  background: linear-gradient(90deg,transparent,rgba(var(--primary-rgb),0.3),var(--primary-glow),var(--primary),var(--primary-glow),rgba(var(--primary-rgb),0.3),transparent);
  animation: divPulse 4s ease-in-out infinite;
}
@keyframes divPulse { 0%,100%{opacity:0.6;transform:scaleX(1)} 50%{opacity:0.85;transform:scaleX(1.05)} }

/* ===== Grid ===== */
.grid {
  display: grid; gap: 1rem;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  flex: 1;
}
.panel {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 3px; padding: 1rem;
  backdrop-filter: blur(8px);
  transition: all var(--transition);
  position: relative;
}
.panel:hover { border-color: rgba(var(--primary-rgb),0.4); }
.panel-title {
  font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--text-dim); margin-bottom: 0.6rem;
  border-bottom: 1px solid rgba(var(--primary-rgb),0.1); padding-bottom: 0.4rem;
}

/* Status blocks */
.stat-row { display: flex; justify-content: space-between; padding: 0.3rem 0; font-size: 0.85rem; border-bottom: 1px solid rgba(var(--primary-rgb),0.06); }
.stat-row:last-child { border-bottom: none; }
.stat-label { color: var(--text-dim); }
.stat-value { color: var(--text-bright); font-family: 'Courier New', monospace; }

/* Mang perception stream */
.mang-perception {
  font-size: 0.95rem; color: var(--text-bright); line-height: 1.5;
  padding: 0.5rem; border-left: 2px solid var(--primary);
  background: rgba(var(--primary-rgb),0.04);
  margin-bottom: 0.5rem;
  font-style: italic;
}
.mang-coords { font-size: 0.75rem; color: var(--text-dim); margin-top: 0.3rem; font-family: 'Courier New', monospace; }
.seed-count { font-size: 1.8rem; font-weight: 700; color: var(--text-bright); display: flex; align-items: center; gap: 0.5rem; }
.seed-count span { font-size: 1rem; color: var(--text-dim); font-weight: 400; }

/* External info */
.intel-item { font-size: 0.78rem; padding: 0.25rem 0; border-bottom: 1px solid rgba(var(--primary-rgb),0.06); }
.intel-item:last-child { border-bottom: none; }
.intel-source { color: var(--primary); margin-right: 0.4rem; }

/* Loading */
.loading { color: var(--text-dim); font-size: 0.8rem; animation: blink 1.5s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* Footer */
.footer {
  text-align: center; padding: 1.5rem 0 0.5rem;
  font-size: 0.7rem; color: var(--text-dim);
  letter-spacing: 0.15em;
}
.footer a { color: var(--primary); text-decoration: none; }
.footer a:hover { text-decoration: underline; }

/* ===== Responsive ===== */
@media (max-width: 600px) {
  .container { padding: 1rem; }
  .header { padding: 1.5rem 0 0.5rem; }
  .grid { grid-template-columns: 1fr; }
}

<script>
// ===== Particles =====
const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const root = document.documentElement;
const style = getComputedStyle(root);

function getCSS(varName) {
  return style.getPropertyValue(varName).trim();
}

// Particle layers
const dustParticles = [];
const embers = [];
const fallingAshes = [];
const NUM_DUST = 90;
const NUM_EMBER = 12;
const NUM_ASH = 20;
let mouseX = -9999, mouseY = -9999;
let primaryRGB = '194,90,44';

document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
document.addEventListener('touchmove', e => { const t = e.touches[0]; mouseX = t.clientX; mouseY = t.clientY; }, {passive:true});

class Dust {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.vx = (Math.random() - 0.5) * 0.15;
    this.vy = (Math.random() - 0.5) * 0.1;
    this.size = Math.random() * 2 + 0.5;
    this.alpha = Math.random() * 0.4 + 0.1;
    this.pulse = Math.random() * Math.PI * 2;
  }
  update() {
    this.pulse += 0.005;
    this.x += this.vx + Math.sin(this.pulse) * 0.02;
    this.y += this.vy + Math.cos(this.pulse) * 0.02;
    // Mouse repulsion
    const dx = this.x - mouseX, dy = this.y - mouseY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 120) {
      const force = (120 - dist) / 120 * 0.5;
      this.x += (dx/dist) * force;
      this.y += (dy/dist) * force;
    }
    if (this.x < -10 || this.x > W+10 || this.y < -10 || this.y > H+10) this.reset();
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
    ctx.fillStyle = `rgba(${primaryRGB},${this.alpha})`;
    ctx.fill();
  }
}

class Ember {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * W;
    this.y = H - Math.random() * (H * 0.3);
    this.vx = (Math.random() - 0.5) * 0.3;
    this.vy = -Math.random() * 0.4 - 0.1;
    this.size = Math.random() * 4 + 2;
    this.life = Math.random() * 0.8 + 0.2;
    this.maxLife = this.life;
    this.pulse = Math.random() * Math.PI * 2;
  }
  update() {
    this.pulse += 0.02;
    this.x += this.vx + Math.sin(this.pulse) * 0.1;
    this.y += this.vy;
    this.life -= 0.003;
    this.vy += 0.002;
    if (this.life <= 0 || this.y > H+10) this.reset();
  }
  draw() {
    const alpha = Math.max(0, this.life / this.maxLife) * 0.6;
    const glow = this.size * 3;
    const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, glow);
    grad.addColorStop(0, `rgba(${primaryRGB},${alpha})`);
    grad.addColorStop(0.3, `rgba(${primaryRGB},${alpha * 0.3})`);
    grad.addColorStop(1, `rgba(${primaryRGB},0)`);
    ctx.beginPath();
    ctx.arc(this.x, this.y, glow, 0, Math.PI*2);
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size*0.5, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,230,200,${alpha * 0.4})`;
    ctx.fill();
  }
}

class Ash {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * W;
    this.y = -20;
    this.vx = (Math.random() - 0.5) * 0.2;
    this.vy = Math.random() * 0.3 + 0.1;
    this.size = Math.random() * 3 + 1;
    this.alpha = Math.random() * 0.3 + 0.1;
    this.rotation = Math.random() * Math.PI * 2;
    this.rv = (Math.random() - 0.5) * 0.02;
  }
  update() {
    this.x += this.vx + Math.sin(this.rotation) * 0.05;
    this.y += this.vy;
    this.rotation += this.rv;
    if (this.y > H + 20) this.reset();
  }
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    ctx.fillStyle = `rgba(200,180,160,${this.alpha})`;
    ctx.fillRect(-this.size/2, -this.size/4, this.size, this.size/2);
    ctx.restore();
  }
}

// Lines between nearby particles
function drawLines() {
  const all = [...dustParticles, ...embers];
  for (let i = 0; i < all.length; i++) {
    for (let j = i+1; j < all.length; j++) {
      const dx = all[i].x - all[j].x;
      const dy = all[i].y - all[j].y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 100) {
        ctx.beginPath();
        ctx.moveTo(all[i].x, all[i].y);
        ctx.lineTo(all[j].x, all[j].y);
        ctx.strokeStyle = `rgba(${primaryRGB},${(1 - dist/100) * 0.08})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  }
}

function initParticles() {
  for (let i = 0; i < NUM_DUST; i++) dustParticles.push(new Dust());
  for (let i = 0; i < NUM_EMBER; i++) embers.push(new Ember());
  for (let i = 0; i < NUM_ASH; i++) fallingAshes.push(new Ash());
}

function animateParticles() {
  ctx.clearRect(0, 0, W, H);
  drawLines();
  dustParticles.forEach(p => { p.update(); p.draw(); });
  embers.forEach(p => { p.update(); p.draw(); });
  fallingAshes.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(animateParticles);
}
initParticles();
animateParticles();

// External Intel - 情报滚动显示
var intelCycle = 0; // 轮播索引

async function fetchIntel() {
  try {
    const r = await tFetch('/api/world');
    const d = await r.json();
    if (checkGateError(d)) return;
    
    // 收集所有条目
    var items = [];
    if (d.weather) items.push({icon:'🌡', text:(d.weather+'').slice(0,65)});
    if (d.hn && d.hn.length) {
      d.hn.forEach(function(n) { items.push({icon:'🔥 HN', text:(n+'').slice(0,65)}); });
    }
    if (d.news && d.news.length) {
      d.news.forEach(function(n) { items.push({icon:'📡', text:(n+'').slice(0,65)}); });
    }
    if (d.earthquakes && d.earthquakes.length) {
      d.earthquakes.slice(0,2).forEach(function(n) { items.push({icon:'🌍', text:(n+'').slice(0,65)}); });
    }
    if (d.github) {
      items.push({icon:'🐙 GitHub', text: d.github.stars+'星 · 更新'+d.github.updated});
    }
    
    intelCycle = (intelCycle + 1) % Math.max(items.length, 1);
    
    // 显示当前窗口（5条，带轮播）
    var html = '';
    var count = Math.min(5, items.length);
    for (var i = 0; i < count; i++) {
      var idx = (intelCycle + i) % items.length;
      var it = items[idx];
      html += '<div class="intel-item"><span class="intel-source">'+it.icon+'</span>'+it.text+'</div>';
    }
    // 更新时间显示
    var now = new Date();
    var t = now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0')+':'+now.getSeconds().toString().padStart(2,'0');
    html += '<div style="font-size:0.6rem;color:rgba(120,100,80,0.4);text-align:right;margin-top:0.3rem">⟳ '+t+' · '+items.length+'条情报</div>';
    
    document.getElementById('intelStatus').innerHTML = html;
  } catch(e) {
    document.getElementById('intelStatus').innerHTML = '<div class="loading">情报中断...</div>';
  }
}
